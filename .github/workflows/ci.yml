name: CI

on:
  push:
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: configapp
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: 'configapp/go.mod'
      - name: Build release binaries
        run: |
          make build
          make build_release
      - name: Upload all binaries
        uses: actions/upload-artifact@v4
        with:
          name: binaries
          path: configapp/bin/
          retention-days: 1

  test-e2e:
    runs-on: ubuntu-latest
    needs: build
    defaults:
      run:
        working-directory: configapp
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: binaries
          path: configapp/bin/
      - name: Ensure mce-e2e is executable
        run: chmod +x bin/mce-e2e
      - name: Run e2e tests
        run: make test_e2e
    